<!DOCTYPE html>
<html lang="de">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<h1>Maximalkraftrechner</h1>
	</head>



	<body>
		Dieses Tool erstellt eine Tabelle zur <br> Maximalkraft nach verschiedenen Formeln.

		<br>
		<br>
		<input type="number" id="kilogramm" value=75 min="1" max="999" onChange="showHello()" onInput="showHello()">
		Kilogramm
		<br>
		<input type="number" id="wiederholungen" value=10 min="2" max="15" onChange="showHello()" onInput="showHello()">
		Wiederholungen (beste Ergebnisse im Bereich 5-8)
		<br>
		<br>

		<table>
			<tr>
				<th>Reps</th>
				<th>Brzycki</th>
				<th>Epley</th>
			</tr>
			<tr>
				<td align='middle'>1</td>
				<td id='brzycki1' align='right'>abc</td>
				<td id='epley1' align='right'>abc</td>
			</tr>
			<tr>
				<td align='middle'>2</td>
				<td id='brzycki2' align='right'>abc</td>
				<td id='epley2' align='right'>abc</td>
			</tr>
			<tr>
				<td align='middle'>3</td>
				<td id='brzycki3' align='right'>abc</td>
				<td id='epley3' align='right'>abc</td>
			</tr>
			<tr>
				<td align='middle'>4</td>
				<td id='brzycki4' align='right'>abc</td>
				<td id='epley4' align='right'>abc</td>
			</tr>
			<tr>
				<td align='middle'>5</td>
				<td id='brzycki5' align='right'>abc</td>
				<td id='epley5' align='right'>abc</td>
			</tr>
			<tr>
				<td align='middle'>6</td>
				<td id='brzycki6' align='right'>abc</td>
				<td id='epley6' align='right'>abc</td>
			</tr>
			<tr>
				<td align='middle'>7</td>
				<td id='brzycki7' align='right'>abc</td>
				<td id='epley7' align='right'>abc</td>
			</tr>
			<tr>
				<td align='middle'>8</td>
				<td id='brzycki8' align='right'>abc</td>
				<td id='epley8' align='right'>abc</td>
			</tr>
			<tr>
				<td align='middle'>9</td>
				<td id='brzycki9' align='right'>abc</td>
				<td id='epley9' align='right'>abc</td>
			</tr>
			<tr>
				<td align='middle'>10</td>
				<td id='brzycki10' align='right'>abc</td>
				<td id='epley10' align='right'>abc</td>
			</tr>
		</table>
	</body>



	<script>
		showHello();
		function showHello() {
			let wiederholungen = document.getElementById('wiederholungen').value;
			let kilogramm = document.getElementById('kilogramm').value;

			document.getElementById('brzycki1').innerText = ((kilogramm * (36 / (37 - wiederholungen))) / (36 / (37-1))).toFixed(1);
			document.getElementById('brzycki2').innerText = ((kilogramm * (36 / (37 - wiederholungen))) / (36 / (37-2))).toFixed(1);
			document.getElementById('brzycki3').innerText = ((kilogramm * (36 / (37 - wiederholungen))) / (36 / (37-3))).toFixed(1);
			document.getElementById('brzycki4').innerText = ((kilogramm * (36 / (37 - wiederholungen))) / (36 / (37-4))).toFixed(1);
			document.getElementById('brzycki5').innerText = ((kilogramm * (36 / (37 - wiederholungen))) / (36 / (37-5))).toFixed(1);
			document.getElementById('brzycki6').innerText = ((kilogramm * (36 / (37 - wiederholungen))) / (36 / (37-6))).toFixed(1);
			document.getElementById('brzycki7').innerText = ((kilogramm * (36 / (37 - wiederholungen))) / (36 / (37-7))).toFixed(1);
			document.getElementById('brzycki8').innerText = ((kilogramm * (36 / (37 - wiederholungen))) / (36 / (37-8))).toFixed(1);
			document.getElementById('brzycki9').innerText = ((kilogramm * (36 / (37 - wiederholungen))) / (36 / (37-9))).toFixed(1);
			document.getElementById('brzycki10').innerText = ((kilogramm * (36 / (37 - wiederholungen))) / (36 / (37-10))).toFixed(1);


			document.getElementById('epley1').innerText = (kilogramm*(1+(wiederholungen/30))).toFixed(1)  ;
			document.getElementById('epley2').innerText = ((kilogramm*(1+(wiederholungen/30))) / (1+(2/30))).toFixed(1)  ;
			document.getElementById('epley3').innerText = ((kilogramm*(1+(wiederholungen/30))) / (1+(3/30))).toFixed(1)  ;
			document.getElementById('epley4').innerText = ((kilogramm*(1+(wiederholungen/30))) / (1+(4/30))).toFixed(1)  ;
			document.getElementById('epley5').innerText = ((kilogramm*(1+(wiederholungen/30))) / (1+(5/30))).toFixed(1)  ;
			document.getElementById('epley6').innerText = ((kilogramm*(1+(wiederholungen/30))) / (1+(6/30))).toFixed(1)  ;
			document.getElementById('epley7').innerText = ((kilogramm*(1+(wiederholungen/30))) / (1+(7/30))).toFixed(1)  ;
			document.getElementById('epley8').innerText = ((kilogramm*(1+(wiederholungen/30))) / (1+(8/30))).toFixed(1)  ;
			document.getElementById('epley9').innerText = ((kilogramm*(1+(wiederholungen/30))) / (1+(9/30))).toFixed(1)  ;
			document.getElementById('epley10').innerText = ((kilogramm*(1+(wiederholungen/30))) / (1+(10/30))).toFixed(1)  ;
		}

	</script>


	<style>
		th {
			padding: 15px;
			border-spacing: 30px;
		}
		tr:nth-child(odd) {background: #CCC}
		tr:nth-child(even) {background: #FFF}

</html>
