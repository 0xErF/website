<!DOCTYPE html>
<html lang="de">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" >
		<h1>Ruderechner</h1>
	</head>



	<body>
		Dieses Tool erstellt eine Tabelle zu <br> Ruderzeiten.

		<br>
		<br>

	    <label for="minuten">Minuten:</label>
	    <input type="number" id="minuten" min="0" max="9" value="2" onchange="fillTable()" onInput="fillTable()">
		<br>
	    <label for="sekunden">Sekunden:</label>
	    <input type="number" id="sekunden" min="0" max="59" value="10" onchange="fillTable()" onInput="fillTable()">

		<br>
		<br>
		<table>
			<tr>
				<th>Strecke</th>
				<th>Zeit</th>
			</tr>
			<tr>
				<td align='right'>500m</td>
				<td id='500m' align='right'>2:00</td>
			</tr>
			<tr>
				<td align='right'>1000m</td>
				<td id='1000m' align='right'>4:00</td>
			</tr>
			<tr>
				<td align='right'>2000m</td>
				<td id='2000m' align='right'>8:00</td>
			</tr>
			<tr>
				<td align='right'>5000m</td>
				<td id='5000m' align='right'>20:00</td>
			</tr>
			<tr>
				<td align='right'>10000m</td>
				<td id='10000m' align='right'>40:00</td>
			</tr>
			<tr>
				<td>Halbmarathon</td>
				<td id='hm' align='right'>1:24:24</td>
			</tr>
			<tr>
				<td>Marathon</td>
				<td id='fm' align='right'>2:48:24</td>
			</tr>
			<tr>
				<td id='1min' align='right'>250m</td>
				<td align='right'>1:00</td>
			</tr>
			<tr>
				<td id='5min' align='right'>1250m</td>
				<td align='right'>5:00</td>
			</tr>
			<tr>
				<td id='10min' align='right'>2500m</td>
				<td align='right'>10:00</td>
			</tr>
			<tr>
				<td id='30min' align='right'>7500m</td>
				<td align='right'>30:00</td>
			</tr>
			<tr>
				<td id='60min' align='right'>15000m</td>
				<td align='right'>60:00</td>
			</tr>
		</table>
	</body>



	<script>
		fillTable();
		function fillTable() {
			let minuten = document.getElementById('minuten').value;
			let sekunden = document.getElementById('sekunden').value;

			document.getElementById('500m').innerText = minuten + ":" + sekunden.padStart(2, '0');
			document.getElementById('1000m').innerText = getMinutenOhneStunden(calculateTime(1000)) + ":"
									+ getSekundenOhneStundenMinuten(calculateTime(1000)).toString().padStart(2, '0');
			document.getElementById('2000m').innerText = getMinutenOhneStunden(calculateTime(2000)) + ":"
									+ getSekundenOhneStundenMinuten(calculateTime(2000)).toString().padStart(2, '0');
			document.getElementById('5000m').innerText = getMinutenOhneStunden(calculateTime(5000)) + ":"
									+ getSekundenOhneStundenMinuten(calculateTime(5000)).toString().padStart(2, '0');
			document.getElementById('10000m').innerText = getStunden(calculateTime(10000)) + ":"
									+ getMinutenOhneStunden(calculateTime(10000)).toString().padStart(2, '0') + ":"
									+ getSekundenOhneStundenMinuten(calculateTime(10000)).toString().padStart(2, '0');
			document.getElementById('hm').innerText = getStunden(calculateTime(21098)) + ":"
									+ getMinutenOhneStunden(calculateTime(21098)).toString().padStart(2, '0') + ":"
									+ getSekundenOhneStundenMinuten(calculateTime(21098)).toString().padStart(2, '0');
			document.getElementById('fm').innerText = getStunden(calculateTime(42195)) + ":"
									+ getMinutenOhneStunden(calculateTime(42195)).toString().padStart(2, '0') + ":"
									+ getSekundenOhneStundenMinuten(calculateTime(42195)).toString().padStart(2, '0');


			document.getElementById('1min').innerText = calculateMeters(1*60).toLocaleString() + 'm';
			document.getElementById('5min').innerText = calculateMeters(5*60).toLocaleString() + 'm';
			document.getElementById('10min').innerText = calculateMeters(10*60).toLocaleString() + 'm';
			document.getElementById('30min').innerText = calculateMeters(30*60).toLocaleString() + 'm';
			document.getElementById('60min').innerText = calculateMeters(60*60).toLocaleString() + 'm';


		}

		function calculateMeters(seconds) {
			let minuten = document.getElementById('minuten').value;
			let sekunden = document.getElementById('sekunden').value;

			return Math.floor((seconds/(parseInt(minuten*60) + parseInt(sekunden)))*500);
		}

		function calculateTime(meters) {
			let minuten = document.getElementById('minuten').value;
			let sekunden = document.getElementById('sekunden').value;

			return (meters/500) * (parseInt(minuten*60) + parseInt(sekunden));
		}

		function getStunden(sekunden) {
			return Math.floor(sekunden/60/60);
		}
		function getMinutenOhneStunden(sekunden) {
			return Math.floor((sekunden/60)%60);
		}
		function getSekundenOhneStundenMinuten(sekunden) {
			return Math.ceil((sekunden)%60);
		}


	</script>


	<style>
		th {
			padding: 15px;
			border-spacing: 30px;
		}
		tr:nth-child(odd) {background: #CCC}
		tr:nth-child(even) {background: #FFF}
	</style>
</html>
